<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi Chat</title>
<script type="module">
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    const SPACE_NAME = "Shahid0812/Text"; 
    
    // 1. IDENTITY: Stable ID
    let userId = localStorage.getItem("mochi_user_id");
    if (!userId) {
        userId = "user_" + Math.random().toString(36).substring(7);
        localStorage.setItem("mochi_user_id", userId);
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const text = input.value;
        if (!text.trim()) return;

        // Show User Message immediately
        chatBox.innerHTML += `<div style="margin: 10px 0;"><b>You:</b> ${text}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Connect to your Space
            const client = await Client.connect(SPACE_NAME);
            
            // We pass the data as an array [user_id, message] 
            // to match our chat_logic(user_id, message) function exactly.
            const result = await client.predict("/predict", [
                userId, // Matches 'user_id'
                text,   // Matches 'message'
            ]);

            // Show AI Response
            // result.data[0] is the return value of chat_logic
            const mochiReply = result.data[0];
            chatBox.innerHTML += `<div style="margin: 10px 0; color: pink;"><b>Mochi:</b> ${mochiReply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (err) {
            console.error(err);
            chatBox.innerHTML += `<p style="color: #ff4d4d; font-size: 0.8em;"><i>(Mochi is taking a nap or the Space is booting up...)</i></p>`;
        }
    }

    // Attach to window so the button can see it
    window.sendMessage = sendMessage;

    // Allow "Enter" key to send
    document.getElementById("userInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chatBox { width: 100%; max-width: 400px; height: 400px; border: 1px solid #333; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #1e1e1e; border-radius: 10px; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: pink; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🐾 Mochi Chat</h2>
    <div id="chatBox"></div>
    <div>
        <input type="text" id="userInput" placeholder="Say hi...">
        <button onclick="sendMessage()">Send</button>
    </div>
</body>
  </html>
